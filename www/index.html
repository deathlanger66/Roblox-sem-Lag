
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bloxstrap Mobile Helper</title>
  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      background: #0b0b0f;
      color: white;
      padding: 18px;
    }

    .app {
      max-width: 430px;
      margin: auto;
    }

    .header {
      background: linear-gradient(135deg, #1d1d2b, #111118);
      border: 1px solid #2d2d3d;
      border-radius: 22px;
      padding: 20px;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0;
      font-size: 25px;
    }

    h2 {
      font-size: 18px;
    }

    .card {
      background: #15151e;
      border: 1px solid #292938;
      border-radius: 20px;
      padding: 16px;
      margin-bottom: 14px;
    }

    button {
      width: 100%;
      border: none;
      border-radius: 15px;
      padding: 14px;
      margin-top: 10px;
      background: #2d6bff;
      color: white;
      font-weight: bold;
      font-size: 15px;
    }

    textarea {
      width: 100%;
      height: 170px;
      background: #08080d;
      color: white;
      border-radius: 14px;
      padding: 12px;
      resize: none;
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="header">
      <h1>Bloxstrap Mobile Helper</h1>
      <p>Helper de FPS pro Roblox Mobile</p>
    </section>

    <section class="card">
      <h2>Presets</h2>
      <button onclick="setPreset('potato')">Potato FPS</button>
      <button onclick="setPreset('balanced')">Balanced</button>
      <button onclick="setPreset('max')">FPS Max</button>
    </section>

    <section class="card">
      <h2>Config</h2>
      <textarea id="output">{}</textarea>
      <button onclick="copyConfig()">Copiar</button>
    </section>

    <section class="card">
      <button onclick="openRoblox()">Abrir Roblox</button>
    </section>
  </main>

  <script>
    const presets = {
      potato: {
        "DFIntTaskSchedulerTargetFps": "60",
        "FFlagDisablePostFx": "True"
      },
      balanced: {
        "DFIntTaskSchedulerTargetFps": "60"
      },
      max: {
        "DFIntTaskSchedulerTargetFps": "120"
      }
    };

    function setPreset(name) {
      document.getElementById("output").value =
        JSON.stringify(presets[name], null, 2);
    }

    function copyConfig() {
