<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RoBoost</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      padding: 18px;
      background: #0b0b0f;
      color: white;
    }

    .app {
      max-width: 430px;
      margin: auto;
    }

    .card {
      background: #15151e;
      border: 1px solid #292938;
      border-radius: 22px;
      padding: 20px;
      margin-bottom: 18px;
    }

    .header {
      background: linear-gradient(135deg, #1d1d2b, #111118);
    }

    h1 {
      margin: 0;
      font-size: 26px;
    }

    h2 {
      margin-bottom: 16px;
    }

    p {
      color: #c7c7d4;
      font-size: 15px;
    }

    button {
      width: 100%;
      border: none;
      border-radius: 18px;
      padding: 16px;
      margin-top: 12px;
      background: #2d6bff;
      color: white;
      font-size: 17px;
      font-weight: bold;
    }

    textarea {
      width: 100%;
      height: 180px;
      background: #08080d;
      color: white;
      border: 1px solid #333;
      border-radius: 16px;
      padding: 14px;
      resize: none;
      font-size: 13px;
    }
  </style>
</head>

<body>
  <main class="app">

    <section class="card header">
      <h1>RoBoost</h1>
      <p>FPS Helper pro Roblox Mobile</p>
    </section>

    <section class="card">
      <h2>Presets</h2>
      <button id="potatoBtn">Potato FPS</button>
      <button id="balancedBtn">Balanced</button>
      <button id="maxBtn">FPS Max</button>
    </section>

    <section class="card">
      <h2>Config</h2>
      <textarea id="output">{}</textarea>
      <button id="copyBtn">Copiar Config</button>
    </section>

    <section class="card">
      <button id="openBtn">Abrir Roblox</button>
    </section>

  </main>

  <script>
    const output = document.getElementById("output");

    const presets = {
      potato: {
        "DFIntTaskSchedulerTargetFps": "60",
        "FFlagDisablePostFx": "True",
        "FIntRenderShadowIntensity": "0"
      },

      balanced: {
        "DFIntTaskSchedulerTargetFps": "60",
        "FFlagDisablePostFx": "True"
      },

      max: {
        "DFIntTaskSchedulerTargetFps": "120",
        "FFlagDisablePostFx": "True",
        "FIntRenderShadowIntensity": "0"
      }
    };

    document.getElementById("potatoBtn").addEventListener("click", function () {
      output.value = JSON.stringify(presets.potato, null, 2);
    });

    document.getElementById("balancedBtn").addEventListener("click", function () {
      output.value = JSON.stringify(presets.balanced, null, 2);
    });

    document.getElementById("maxBtn").addEventListener("click", function () {
      output.value = JSON.stringify(presets.max, null, 2);
    });

    document.getElementById("copyBtn").addEventListener("click", function () {
      output.select();
      document.execCommand("copy");
      alert("Config copiada!");
    });

    document.getElementById("openBtn").addEventListener("click", function () {
      window.location.href = "roblox://";
    });
  </script>

</body>
</html>
